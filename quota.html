<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quota Round - IOTE</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Prompt',sans-serif;
  background:#15072e;
  color:white;
}

.navbar{
  background:linear-gradient(to bottom,rgba(0,0,0,0.85),rgba(0,0,0,0));
}

.hero{
  height:40vh;
  background:url("admission.jpg") center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.4);
}

.hero h1{
  position:relative;
  z-index:2;
  font-size:3rem;
  font-weight:600;
}

.quota-section{
  padding:80px 0;
}

.quota-box{
  background:#e9e9e9;
  padding:50px;
  border-radius:10px;
  max-width:950px;
  margin:auto;
  color:black;
}

.quota-title{
  font-size:28px;
  font-weight:600;
  margin-bottom:40px;
}

.quota-card{
  min-height:130px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:white;
  font-size:20px;
  font-weight:500;
  background:linear-gradient(135deg,#ff8a00,#2a1f9d);
  text-decoration:none;
  transition:0.3s;
  padding:20px;
}

.quota-card:hover{
  transform:scale(1.05);
  color:white;
}

.back-btn{
  margin-bottom:25px;
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
  <div class="container">
    <a class="navbar-brand" href="index.html">IoT and Information Engineering</a>
  </div>
</nav>

<section class="hero">
  <h1>Quota Admission</h1>
</section>

<section class="quota-section">
  <div class="quota-box">

    <a href="admission.html" class="btn btn-dark back-btn">
      ← กลับไปหน้า Admission
    </a>

    <div class="quota-title">รอบ 2 QUOTA</div>

    <div class="row g-4">
      <div class="col-md-4">
        <a href="quota1.html" class="quota-card">
          โควตาเรียนดี
        </a>
      </div>

      <div class="col-md-4">
        <a href="quota2.html" class="quota-card">
          โควตา KMITL One
        </a>
      </div>

      <div class="col-md-4">
        <a href="quota3.html" class="quota-card">
          โควตากิจกรรม<br>K-Engineering
        </a>
      </div>
    </div>

  </div>
</section>
<div id="iote-assistant-mount"></div>
<link rel="stylesheet" href="assistant.css">
<script src="routes.js"></script>
<script src="knowledge-th.js"></script>
<script src="knowledge-en.js"></script>
<script src="assistant.js"></script>
</body>
</html>
